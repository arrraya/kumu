version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: kumu_db
      POSTGRES_USER: kumu_user
      POSTGRES_PASSWORD: kumu_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:     
      DATABASE_URL: postgresql://kumu_user:kumu_password@postgres:5432/kumu_db
      REDIS_URL: redis://redis:6379
      API_FOOTBALL_KEY: ${API_FOOTBALL_KEY}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
